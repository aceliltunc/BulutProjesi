# Sablon: __API_UPSTREAM__ => container startta API_UPSTREAM ile (docker-compose: http://api:8080;
# Azure Container Apps coklu container, ayni pod: http://127.0.0.1:8080;)

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location ~ ^(/(list|add|info|health)$|/delete/|/update/) {
        proxy_pass __API_UPSTREAM__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
