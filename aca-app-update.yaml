# Adimlar: pg-conn gizlisini yaz (parolayi repoya koyma):
#   az containerapp secret set -g <RG> -n restaurant-app --secrets "pg-conn=<Npgsql-connection-string>"
#   az containerapp update -g <RG> -n restaurant-app --yaml aca-app-update.yaml
# Iki konteyner: api (8080) + frontend (80), ingress 80 -> frontend, API_UPSTREAM 127.0.0.1:8080
properties:
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: true
      allowInsecure: false
      targetPort: 80
      # Auto bazen Envoy-nginx uyumsuzluguna saplanir; sorun gorursen Http kullan:
      transport: Http
  template:
    scale:
      minReplicas: 1
      maxReplicas: 1
    containers:
      - name: api
        image: restaurantacr0001.azurecr.io/restaurant-api:1.0.0
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: ASPNETCORE_ENVIRONMENT
            value: Production
          - name: ASPNETCORE_URLS
            value: http://+:8080
          - name: ConnectionStrings__DefaultConnection
            secretRef: pg-conn
        probes:
          - type: Liveness
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
      - name: frontend
        image: restaurantacr0001.azurecr.io/restaurant-frontend:1.0.0
        resources:
          cpu: 0.5
          memory: 1Gi
        env:
          - name: API_UPSTREAM
            value: "http://127.0.0.1:8080"
        probes:
          - type: Liveness
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
